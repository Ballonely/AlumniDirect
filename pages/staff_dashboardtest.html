<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Dashboard - Dugtong Carolinian</title>
    
    <style>
        :root { 
            --priColor: #015e2f; 
            --secColor: #fcbf16; 
            --bgGray: #f4f4f4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; background: var(--bgGray); }

        /* Sidebar Styles */
        .sidebar { width: 260px; height: 100vh; background: var(--priColor); color: white; padding: 25px; }
        .sidebar h2 { font-size: 1.2em; margin-bottom: 40px; color: var(--secColor); }
        .nav-links { list-style: none; }
        .nav-links li { padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .nav-links li:hover { color: var(--secColor); padding-left: 10px; }

        /* Content Styles */
        .main-content { flex: 1; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .cards-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h3 { color: #666; font-size: 0.9em; text-transform: uppercase; }
        .card p { font-size: 2.2em; font-weight: 700; color: var(--priColor); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Dugtong Carolinian</h2>
        <ul class="nav-links">
            <li>Dashboard</li>
            <li>Manage Alumni</li>
            <li>Verify Records</li>
            <li>System Logs</li>
            <li>Logout</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Staff Dashboard</h1>
            <div style="background: white; padding: 10px 20px; border-radius: 20px; font-weight: 600; color: var(--priColor);">
                Admin User
            </div>
        </div>

        <div class="cards-container">
            <div class="card">
                <h3>Total Alumni</h3>
                <p>1,240</p>
            </div>
            <div class="card">
                <h3>Pending Verifications</h3>
                <p>12</p>
            </div>
            <div class="card">
                <h3>System Alerts</h3>
                <p>3</p>
            </div>
        </div>
    </div>

</body>
</html>
